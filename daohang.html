
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>如初的网盘导航 - 实时测速网盘站点可访问状态</title>
    <meta name="keywords" content="如初的网盘,传奇补丁网盘,传奇补丁下载,如初的网盘,如初的补丁,176170网盘,ruchu888网盘,博客地址导航">
    <meta name="description" content="如初的网盘导航提供新版网盘、旧版网盘和博客地址的一站式导航服务，页面打开后自动测速站点速度与访问状态，无需外部接口。">
    <meta name="author" content="如初网盘导航">
    <meta name="robots" content="index,follow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #0d6efd 0%, #0056b3 100%);
            min-height: 100vh;
            padding: 20px;
            color: #1f3850;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: #ffffff;
            margin-bottom: 28px;
        }

        .header h1 {
            font-size: 2.4em;
            margin-bottom: 10px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.18);
        }

        .header p {
            font-size: 1.05em;
            opacity: 0.96;
        }

        .toolbar {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
            display: grid;
            grid-template-columns: minmax(0, 1fr) 220px 180px;
            gap: 12px;
        }

        .toolbar input,
        .toolbar select,
        .toolbar button {
            height: 46px;
            border-radius: 12px;
            border: 1px solid #cfe7fb;
            font-size: 14px;
        }

        .toolbar input,
        .toolbar select {
            padding: 0 14px;
            background: #f7fbff;
            color: #1f3850;
        }

        .toolbar button {
            border: none;
            background: linear-gradient(135deg, #58b7ff 0%, #2f93e6 100%);
            color: #ffffff;
            font-weight: 600;
            cursor: pointer;
        }

        .toolbar button:hover {
            background: linear-gradient(135deg, #43a9f6 0%, #227fcc 100%);
        }

        .section {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 15px;
            padding: 24px;
            margin-bottom: 22px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.14);
        }

        .section-title {
            font-size: 1.65em;
            color: #2a5d85;
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 3px solid #5bb7ff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .section-title small {
            font-size: 13px;
            color: #6f8ea9;
            font-weight: 500;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }

        .link-card {
            background: #f7fbff;
            border: 1px solid #003967;
            border-radius: 12px;
            padding: 16px;
            transition: all 0.25s ease;
        }

        .link-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(50, 123, 177, 0.12);
            border-color: #86ccff;
        }

        .link-url {
            display: block;
            color: #002cff;
            font-size: 20px;
            word-break: break-all;
            line-height: 1.7;
            margin-bottom: 10px;
        }

        .link-note {
            color: #7892a7;
            font-size: 12px;
            margin-bottom: 12px;
        }

.card-footer {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
}

.status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 999px;
    font-weight: 600;
}

.status::before {
    content: "";
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
}

.response-time {
    font-size: 12px;
    color: #00a90f;
    margin-right: auto; /* 关键：把“延时”文本推到最右边，按钮会自动靠左排列 */
}

.open-link,
.test-link {
    height: 36px;
    padding: 0 14px;
    border-radius: 10px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
}

.open-link {
    background: #0042f7;
    color: #ffffff;
}

.test-link {
    border: none;
    background: #5934e9;
    color: #f4f4f4;
    cursor: pointer;
}
        .progress-panel {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
            display: none;
        }

        .progress-panel.active {
            display: block;
        }

        .progress-top {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
            color: #5b7a96;
            font-size: 14px;
        }

        .progress-track {
            width: 100%;
            height: 12px;
            border-radius: 999px;
            background: #e6f4ff;
            overflow: hidden;
        }

        .progress-bar {
            width: 0;
            height: 100%;
            background: linear-gradient(90deg, #00e28d 0%, #35eba7 100%);
            transition: width 0.2s ease;
        }

        .stats {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 24px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
        }

        .stat-item {
            padding: 14px;
            background: #f8fcff;
            border-radius: 12px;
            border: 1px solid #d8ecfb;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #2d8fe0;
        }

        .stat-label {
            color: #6c8aa4;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .empty-state {
            display: none;
            background: rgba(255, 255, 255, 0.96);
            border-radius: 15px;
            padding: 28px;
            text-align: center;
            color: #6d889f;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
        }

        .seo-footer-text {
            margin: 0 auto 20px;
            text-align: center;
            color: #edf7ff;
            font-size: 14px;
            padding: 10px 20px;
            max-width: 920px;
            line-height: 1.7;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }

            .toolbar {
                grid-template-columns: 1fr;
            }

            .links-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌐 如初的网盘导航中心</h1>
            <p>自动测速，快速找到可访问的网盘和博客地址</p>
        </div>

      <div class="toolbar">
            <input id="searchInput" type="search" placeholder="搜索域名、分组或备注，例如 176170、博客、网盘">
            <select id="groupFilter">
                <option value="all">全部分组</option>
                <option value="new-netdisk">新版网盘</option>
                <option value="legacy-netdisk">旧版网盘</option>
                <option value="blog">博客百科</option>
            </select>
            <button id="checkAllBtn">重新测速全部</button>
        </div> 

        <div class="progress-panel" id="progressPanel">
            <div class="progress-top">
                <span id="progressText">准备开始测速</span>
                <span id="progressValue">0%</span>
            </div>
            <div class="progress-track">
                <div class="progress-bar" id="progressBar"></div>
            </div>
        </div>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-number" id="total-sites">0</div>
                <div class="stat-label">总站点数</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="visible-sites">0</div>
                <div class="stat-label">当前显示</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="online-sites">0</div>
                <div class="stat-label">在线站点</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="offline-sites">0</div>
                <div class="stat-label">离线站点</div>
            </div>
        </div>

        <div id="sectionsContainer"></div>
        <div class="empty-state" id="emptyState">没有匹配到站点，请尝试更换关键词。</div>

        <div class="seo-footer-text">
            如初网盘导航专注于提供ruchu888网盘、176170新版网盘等常用网盘地址的导航服务，实时测速各网盘站点的在线状态，帮助用户快速找到可正常访问的网盘链接，避免无效链接浪费时
        </div>
    </div>

 <script>
    const SITE_GROUPS = [
        {
            id: 'new-netdisk',
            title: '新版网盘地址',
            description: '176170 系列新版入口',
            items: [
                { url: 'https://www.176170.xyz', note: '新版主站入口' },
                { url: 'https://1.176170.xyz', note: '新版备用入口 1' },
                { url: 'https://2.176170.xyz', note: '新版备用入口 2' },
                { url: 'https://3.176170.xyz', note: '新版备用入口 3' },
                { url: 'https://4.176170.xyz', note: '新版备用入口 4' }
            ]
        },
        {
            id: 'legacy-netdisk',
            title: '旧版网盘地址',
            description: '历史常用入口',
            items: [
                { url: 'https://ruchu888.ysepan.com', note: '旧版入口 1' },
                { url: 'https://ruchu888.ysok.net', note: '旧版入口 2' },
                { url: 'https://ruchu888.cccpan.com', note: '旧版入口 3' },
                { url: 'https://ruchu888.uupan.net', note: '旧版入口 4' },
                { url: 'https://ruchu888.ysupan.com', note: '旧版入口 5' }
            ]
        },
        {
            id: 'blog',
            title: '传奇最全百科知识',
            description: '百科知识与博客内容入口合集',
            items: [
                { url: 'https://bk1.176170.xyz', note: '百科入口 1' },
                { url: 'https://bk2.176170.xyz', note: '百科入口 2' },
                { url: 'https://bk3.176170.xyz', note: '百科入口 3' },
                { url: 'https://bk4.176170.xyz', note: '百科入口 4' },
                { url: 'https://bk5.176170.xyz', note: '百科入口 5' },
                { url: 'https://bk6.176170.xyz', note: '百科入口 6' },
                { url: 'https://bk7.176170.xyz', note: '百科入口 7' },
                { url: 'https://bk8.176170.xyz', note: '百科入口 8' }
            ]
        }
    ];

    const STORAGE_KEY = 'ruchu-nav-status-cache';

    const state = {
        search: '',
        group: 'all',
        running: false,
        checks: loadChecks()
    };

    const allSites = SITE_GROUPS.flatMap(group =>
        group.items.map((item, index) => ({
            id: `${group.id}-${index}`,
            groupId: group.id,
            groupTitle: group.title,
            groupDescription: group.description,
            url: item.url,
            note: item.note
        }))
    );

    const searchInput = document.getElementById('searchInput');
    const groupFilter = document.getElementById('groupFilter');
    const checkAllBtn = document.getElementById('checkAllBtn');
    const sectionsContainer = document.getElementById('sectionsContainer');
    const emptyState = document.getElementById('emptyState');
    const progressPanel = document.getElementById('progressPanel');
    const progressText = document.getElementById('progressText');
    const progressValue = document.getElementById('progressValue');
    const progressBar = document.getElementById('progressBar');

    function loadChecks() {
        try {
            const saved = localStorage.getItem(STORAGE_KEY);
            return saved ? JSON.parse(saved) : {};
        } catch {
            return {};
        }
    }

    function saveChecks() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state.checks));
    }

    function getCheck(siteId) {
        return state.checks[siteId] || {
            statusClass: 'status-waiting',
            label: '等待测速',
            detail: '暂无测速数据'
        };
    }

    function getFilteredSites() {
        const keyword = state.search.trim().toLowerCase();
        return allSites.filter(site => {
            const matchGroup = state.group === 'all' || site.groupId === state.group;
            const matchSearch = !keyword || [site.url, site.note, site.groupTitle].join(' ').toLowerCase().includes(keyword);
            return matchGroup && matchSearch;
        });
    }

    function renderSections() {
        const filteredSites = getFilteredSites();
        const groups = SITE_GROUPS.map(group => ({
            group,
            items: filteredSites.filter(site => site.groupId === group.id)
        })).filter(entry => entry.items.length > 0);

        sectionsContainer.innerHTML = groups.map(({ group, items }) => `
            <div class="section">
                <h2 class="section-title">
                    <span>${group.title}</span>
                    <small>${group.description} · ${items.length} 个地址</small>
                </h2>
                <div class="links-grid">
                    ${items.map(site => renderSiteCard(site)).join('')}
                </div>
            </div>
        `).join('');

        emptyState.style.display = groups.length ? 'none' : 'block';
        bindCardEvents();
        updateStats(filteredSites.length);
    }

    function renderSiteCard(site) {
        const check = getCheck(site.id);
        return `
            <div class="link-card">
                <a class="link-url" href="${site.url}" target="_blank" rel="noopener noreferrer">${site.url}</a>
                <div class="link-note">${site.note}</div>
                <div class="card-footer">
                    <span class="status ${check.statusClass}">${check.label}</span>
                    <span class="response-time">${check.detail}</span>
                    <a class="open-link" href="${site.url}" target="_blank" rel="noopener noreferrer">打开</a>
                    <button class="test-link" type="button" data-site-id="${site.id}">测速</button>
                </div>
            </div>
        `;
    }

    function updateStats(visibleCount) {
        const values = Object.values(state.checks);
        const onlineCount = values.filter(item => item.statusClass === 'status-online').length;
        const offlineCount = values.filter(item => item.statusClass === 'status-offline').length;

        document.getElementById('total-sites').textContent = allSites.length;
        document.getElementById('visible-sites').textContent = visibleCount;
        document.getElementById('online-sites').textContent = onlineCount;
        document.getElementById('offline-sites').textContent = offlineCount;
    }

    function updateProgress(current, total, text) {
        const percent = Math.round((current / (total || 1)) * 100);
        progressPanel.classList.add('active');
        progressText.textContent = text;
        progressValue.textContent = `${percent}%`;
        progressBar.style.width = `${percent}%`;
    }

    // 👇 这是已经改好的、解决跨域的测速函数
    async function detectSite(url) {
        const started = performance.now();
        const timeout = 6000;

        try {
            const testUrl = new URL('/favicon.ico', url).href;
            await new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = resolve;
                img.onerror = resolve;
                setTimeout(() => reject('timeout'), timeout);
                img.src = testUrl + '?t=' + Date.now();
            });

            const duration = Math.round(performance.now() - started);
            return {
                statusClass: 'status-online',
                label: '在线',
                detail: `延时 ${duration} ms`
            };
        } catch (err) {
            if (err === 'timeout') {
                return {
                    statusClass: 'status-offline',
                    label: '超时',
                    detail: '测速超时'
                };
            }
            return {
                statusClass: 'status-offline',
                label: '失败',
                detail: '无法访问'
            };
        }
    }

    function setChecking(siteId) {
        state.checks[siteId] = {
            statusClass: 'status-checking',
            label: '测速中',
            detail: '正在测速...'
        };
        saveChecks();
        renderSections();
    }

    async function runDetection(targetSites) {
        if (!targetSites.length || state.running) return;

        state.running = true;
        checkAllBtn.disabled = true;
        updateProgress(0, targetSites.length, '准备开始测速');

        for (let i = 0; i < targetSites.length; i++) {
            const site = targetSites[i];
            setChecking(site.id);
            updateProgress(i, targetSites.length, `正在测速 ${site.url}`);
            const result = await detectSite(site.url);
            state.checks[site.id] = result;
            saveChecks();
            renderSections();
            updateProgress(i + 1, targetSites.length, `已完成 ${i + 1}/${targetSites.length}`);
        }

        state.running = false;
        checkAllBtn.disabled = false;
    }

    function bindCardEvents() {
        document.querySelectorAll('[data-site-id]').forEach(button => {
            button.addEventListener('click', async () => {
                const siteId = button.dataset.siteId;
                const site = allSites.find(item => item.id === siteId);
                if (!site) return;
                await runDetection([site]);
            });
        });
    }

    function bindEvents() {
        searchInput.addEventListener('input', e => {
            state.search = e.target.value;
            renderSections();
        });

        groupFilter.addEventListener('change', e => {
            state.group = e.target.value;
            renderSections();
        });

        checkAllBtn.addEventListener('click', () => {
            runDetection(getFilteredSites());
        });
    }

    function initializePage() {
        renderSections();
        bindEvents();
        setTimeout(() => {
            runDetection(allSites);
        }, 300);
    }

    document.addEventListener('DOMContentLoaded', initializePage);
</script>
</body>
</html>
